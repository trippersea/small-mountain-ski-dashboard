<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Where To Ski?!</title>
  <meta name="description" content="256 mountains across 34 states ranked in real time — live snow forecasts, drive times, pass networks, and a straight answer on where to ski next." />
  <meta property="og:title" content="Where To Ski?! — The Ski Decision Engine" />
  <meta property="og:description" content="256 mountains nationwide, live weather, ranked for your weekend. Free, no account needed." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
  <div id="sliderTooltip" class="slider-tooltip" role="tooltip"></div>

  <nav class="top-nav">
    <div class="top-nav-inner">
      <span class="nav-brand">Where To Ski?!</span>
      <div class="nav-divider"></div>
      <a href="#verdictSection" class="nav-cta" id="navVerdictLink">My Pick</a>
      <a href="#compareSection" class="nav-cta nav-cta-db" id="navDbLink">Compare</a>
      <div class="nav-divider"></div>
      <a href="#stormSection" class="nav-secondary">Storm Chaser</a>
      <a href="#hiddenGemSection" class="nav-secondary">Hidden Gems</a>
      <a href="#mapSection" class="nav-secondary">Map</a>
      <button class="btn-ghost nav-share" onclick="copyShareLink()">Share</button>
    </div>
  </nav>

  <button id="backToTop" class="back-to-top" aria-label="Back to top">↑ Top</button>

  <div class="container">

    <!-- HERO -->
    <section id="searchSection" class="hero card hero-search">
      <div class="hero-search-inner">
        <div class="hero-headline">Where are you skiing from?</div>
        <div class="hero-subhead">Enter ZIP code or city — we'll find your best mountain this weekend.</div>

        <div class="hero-search-bar">
          <input id="originInput" type="text" class="hero-search-input"
                 placeholder="e.g. 02301 or Brockton, MA" autocomplete="off" autofocus />
          <button id="setLocation" class="hero-search-btn">Find My Mountain</button>
        </div>

        <div class="hero-search-meta">
          <button id="detectLocation" class="hero-locate-link">Use current location</button>
          <span class="hero-meta-divider">·</span>
          <label class="remember-location-label">
            <input type="checkbox" id="rememberLocation" />
            Remember this location
            <span class="location-privacy-tip" tabindex="0">?
              <span class="location-privacy-tooltip">Stored only in your browser — never sent to servers.</span>
            </span>
          </label>
        </div>

        <div id="locationStatus" class="helper-text hero-location-status"></div>

        <div class="hero-ai-row">
          <span class="hero-ai-label">Not sure? Tell us your perfect ski day</span>
          <div class="hero-ai-input-row">
            <input id="aiChatInput" type="text" class="ai-chat-input"
                   placeholder='e.g. "Ikon pass, < 3 hrs from Boston, fresh powder"' />
            <button id="aiChatBtn" class="btn btn-ai">Ask AI</button>
          </div>
          <div id="aiChatResult" class="ai-chat-result hidden"></div>
        </div>
      </div>
    </section>

    <div class="planner-verdict-row">
      <!-- Planner -->
      <section id="plannerSection" class="card panel planner-col">
        <!-- ... your existing planner HTML remains here ... -->
      </section>

      <!-- Verdict (was missing / incomplete in some versions) -->
      <section id="verdictSection" class="card panel verdict-col">
        <div id="verdictCard"></div>
      </section>
    </div>

    <!-- Compare section -->
    <section id="compareSection" class="card panel">
      <!-- ... your existing compare table + mobile grid ... -->
    </section>

    <!-- Storm chaser + Hidden gems -->
    <section class="feature-grid">
      <section id="stormSection" class="card panel">...</section>
      <section id="hiddenGemSection" class="card panel">...</section>
    </section>

    <!-- Detail view -->
    <section id="detailSection" class="card panel hidden">
      <div id="detailCard"></div>
    </section>

    <!-- Map -->
    <section id="mapSection" class="card panel">
      <!-- ... existing map HTML ... -->
    </section>

    <!-- Footer summary -->
    <section class="db-summary-section">
      <div class="db-summary-label">Database summary</div>
      <div id="summaryCards" class="db-summary-grid"></div>
    </section>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="resorts-data.js"></script>
  <script src="resorts.js"></script>
</body>
</html>
